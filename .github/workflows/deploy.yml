name: Deploy para Cloudflare

on:
  push:
    branches: [main]
  # Republica o site todo dia às 09:05 UTC (06:05 no horário de Brasília)
  # para liberar automaticamente os posts agendados cuja data já chegou.
  schedule:
    - cron: '5 9 * * *'
  # Permite republicar manualmente pelo painel do GitHub Actions.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build e Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy no Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: c1b24e44f725c9957a0b4435b0344f3a
